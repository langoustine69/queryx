name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: cd queryx && bun install
      - name: Test
        run: cd queryx && bun test
      - name: TypeScript
        run: cd queryx && bunx tsc --noEmit